<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris - Block Puzzle Game</title>
    <link rel="stylesheet" href="tetris_style.css" />
    <link rel="icon" type="image/png" href="logo.png" />
  </head>

  <body>
    <div class="game-container">
      <h1>TETRIS</h1>

      <div class="game-area">
        <!-- Main Game Canvas -->
        <canvas id="tetris" width="300" height="480"></canvas>

        <!-- Side Panel -->
        <div class="side-panel">
          <div class="panel-box">
            <h3>Score</h3>
            <p id="score">0</p>
          </div>

          <div class="panel-box">
            <h3>Next Block</h3>
            <canvas id="next" width="150" height="150"></canvas>
          </div>
        </div>
      </div>

      <div id="gameOverPanel" class="game-over hidden">
        <h2>Game Over</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script src="tetris_logic.js"></script>
  </body>
</html>
